<!DOCTYPE html>
<html>
<head>
    <title>{{ module.title }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body style="margin:0; padding:20px; font-family:Arial, sans-serif; background:#ffffff;">

    <h2 style="margin-top:0;">{{ module.title }}</h2>

    {% if module.video_mpd %}
        <div style="margin-bottom:14px; display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
            <label for="qualitySelector" style="font-size:14px; font-weight:700; color:#111827;">
                Video Quality
            </label>

            <select
                id="qualitySelector"
                style="padding:10px 12px; border:1px solid #cbd5e1; border-radius:10px; background:#fff; font-size:14px; font-weight:600; min-width:220px;">
                <option value="auto">Auto</option>
            </select>

            <span
                id="qualityStatus"
                style="font-size:13px; font-weight:700; color:#2563eb; background:#eff6ff; padding:8px 12px; border-radius:999px;">
                Quality: Auto
            </span>
        </div>

        <video
            id="videoPlayer"
            controls
            controlsList="nodownload noplaybackrate"
            playsinline
            style="width:100%; max-width:100%; height:auto; background:#000;">
        </video>

        <div id="playerStatus" style="margin-top:12px; color:#2563eb; font-size:14px; font-weight:600;">
            Loading video...
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const video = document.getElementById("videoPlayer");
                const statusBox = document.getElementById("playerStatus");
                const qualitySelector = document.getElementById("qualitySelector");
                const qualityStatus = document.getElementById("qualityStatus");

                const url = "{{ secure_mpd_url|default:''|escapejs }}";
                console.log("MPD URL:", url);

                if (!url) {
                    statusBox.textContent = "Playback error: secure MPD URL missing";
                    statusBox.style.color = "#dc2626";
                    return;
                }

                const player = dashjs.MediaPlayer().create();

                let lastAllowedTime = 0;
                let blockSeek = false;
                let manualQualityIndex = null;

                function setStatus(text, color = "#2563eb") {
                    statusBox.textContent = text;
                    statusBox.style.color = color;
                }

                function formatBitrateKbps(value) {
                    const num = Number(value || 0);
                    return Math.round(num / 1000);
                }

                function getVideoBitrateList() {
                    try {
                        const list = player.getBitrateInfoListFor("video");
                        if (Array.isArray(list) && list.length) {
                            return list;
                        }
                    } catch (e) {
                        console.log("Bitrate list read failed:", e);
                    }
                    return [];
                }

                function buildQualityLabel(info, isAuto) {
                    if (!info) {
                        return isAuto ? "Auto" : "Manual";
                    }

                    const kbps = formatBitrateKbps(info.bitrate);
                    const width = info.width || "";
                    const height = info.height || "";

                    if (width && height) {
                        return isAuto
                            ? `Auto • ${kbps} kbps (${width}x${height})`
                            : `${kbps} kbps (${width}x${height})`;
                    }

                    return isAuto
                        ? `Auto • ${kbps} kbps`
                        : `${kbps} kbps`;
                }

                function populateQualitySelector() {
                    const bitrateList = getVideoBitrateList();

                    qualitySelector.innerHTML = "";
                    const autoOption = document.createElement("option");
                    autoOption.value = "auto";
                    autoOption.textContent = "Auto";
                    qualitySelector.appendChild(autoOption);

                    bitrateList.forEach(function (info, index) {
                        const option = document.createElement("option");
                        option.value = String(index);

                        const kbps = formatBitrateKbps(info.bitrate);
                        const width = info.width || "";
                        const height = info.height || "";

                        if (width && height) {
                            option.textContent = `${kbps} kbps (${width}x${height})`;
                        } else {
                            option.textContent = `${kbps} kbps`;
                        }

                        qualitySelector.appendChild(option);
                    });

                    syncQualitySelector();
                    updateQualityStatus();
                }

                function syncQualitySelector() {
                    const isAuto = player.getSettings()?.streaming?.abr?.autoSwitchBitrate?.video !== false;

                    if (isAuto) {
                        qualitySelector.value = "auto";
                        return;
                    }

                    const currentQuality = player.getQualityFor("video");
                    if (currentQuality !== null && currentQuality !== undefined) {
                        qualitySelector.value = String(currentQuality);
                    }
                }

                function updateQualityStatus() {
                    const bitrateList = getVideoBitrateList();
                    const currentQuality = player.getQualityFor("video");
                    const isAuto = player.getSettings()?.streaming?.abr?.autoSwitchBitrate?.video !== false;
                    const info = bitrateList[currentQuality];

                    qualityStatus.textContent = "Quality: " + buildQualityLabel(info, isAuto);
                }

                function enableAutoQuality() {
                    manualQualityIndex = null;

                    try {
                        player.updateSettings({
                            streaming: {
                                abr: {
                                    autoSwitchBitrate: {
                                        video: true
                                    }
                                }
                            }
                        });
                    } catch (e) {
                        console.log("Enable auto failed:", e);
                    }

                    syncQualitySelector();
                    updateQualityStatus();
                    setStatus("Auto quality enabled");
                }

                function applyManualQuality(index) {
                    manualQualityIndex = index;

                    try {
                        player.updateSettings({
                            streaming: {
                                abr: {
                                    autoSwitchBitrate: {
                                        video: false
                                    }
                                }
                            }
                        });
                    } catch (e) {
                        console.log("Disable auto failed:", e);
                    }

                    try {
                        player.setQualityFor("video", index);
                    } catch (e) {
                        console.log("setQualityFor failed:", e);
                    }

                    try {
                        player.setRepresentationForTypeByIndex("video", index);
                    } catch (e) {
                        console.log("setRepresentationForTypeByIndex failed:", e);
                    }

                    syncQualitySelector();
                    updateQualityStatus();
                    setStatus("Manual quality selected");
                }

                qualitySelector.addEventListener("change", function () {
                    const selectedValue = qualitySelector.value;

                    if (selectedValue === "auto") {
                        enableAutoQuality();
                        return;
                    }

                    const selectedIndex = parseInt(selectedValue, 10);
                    if (!Number.isNaN(selectedIndex)) {
                        applyManualQuality(selectedIndex);
                    }
                });

                player.initialize(video, url, false);

                player.updateSettings({
                    streaming: {
                        abr: {
                            autoSwitchBitrate: {
                                video: true
                            }
                        }
                    }
                });

                player.on(dashjs.MediaPlayer.events.MANIFEST_LOADED, function () {
                    console.log("DASH manifest loaded");
                    setStatus("Manifest loaded");
                });

                player.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, function () {
                    console.log("DASH stream initialized");
                    populateQualitySelector();
                    updateQualityStatus();
                    setStatus("Video loaded successfully");
                });

                player.on(dashjs.MediaPlayer.events.QUALITY_CHANGE_REQUESTED, function (e) {
                    console.log("QUALITY_CHANGE_REQUESTED:", e);
                });

                player.on(dashjs.MediaPlayer.events.QUALITY_CHANGE_RENDERED, function (e) {
                    console.log("QUALITY_CHANGE_RENDERED:", e);
                    syncQualitySelector();
                    updateQualityStatus();
                });

                player.on(dashjs.MediaPlayer.events.ERROR, function (e) {
                    console.error("DASH ERROR:", e);
                    setStatus("Playback error", "#dc2626");
                });

                video.addEventListener("loadedmetadata", function () {
                    setStatus("Video ready");
                });

                video.addEventListener("play", function () {
                    setStatus("Playing");
                });

                video.addEventListener("pause", function () {
                    if (!video.ended) {
                        setStatus("Paused");
                    }
                });

                video.addEventListener("ended", function () {
                    setStatus("Completed");
                });

                video.addEventListener("timeupdate", function () {
                    if (!blockSeek && video.currentTime > lastAllowedTime) {
                        lastAllowedTime = video.currentTime;
                    }
                });

                video.addEventListener("seeking", function () {
                    if (blockSeek) return;

                    if (video.currentTime > lastAllowedTime + 1) {
                        blockSeek = true;
                        video.currentTime = lastAllowedTime;
                        setStatus("Forward seeking is blocked", "#d97706");

                        setTimeout(function () {
                            blockSeek = false;
                        }, 100);
                    }
                });
            });
        </script>
    {% else %}
        <p style="color:#dc2626; font-weight:600;">Video not available.</p>
    {% endif %}

</body>
</html>
