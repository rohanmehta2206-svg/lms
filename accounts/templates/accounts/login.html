<!DOCTYPE html>
<html>
<head>
    <title>Login | LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fa;
        }

        .header {
            background: #0f6cbf;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            max-width: 500px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 500;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
        }

        input:focus {
            border-color: #0f6cbf;
            outline: none;
        }

        button {
            margin-top: 30px;
            background: #0f6cbf;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 15px;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #0c57a1;
        }

        .register-link {
            margin-top: 20px;
            text-align: center;
        }

        .register-link a {
            color: #0f6cbf;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="header">
    LMS Teacher Portal
</div>

<div class="container">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.username.label_tag }}
        {{ form.username }}

        {{ form.password.label_tag }}
        {{ form.password }}

        <button type="submit">Login</button>
    </form>

    <div class="register-link">
        Don’t have an account?
        <!-- FIXED HERE -->
        <a href="{% url 'accounts:register' %}">Create one</a>
    </div>

</div>

<div class="footer">
    © 2026 LMS System | Secure Academic Platform
</div>

</body>
</html>
