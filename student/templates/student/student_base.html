<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LMS{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        .logout {
            background: #2563eb;
            color: white !important;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
        }

        .logout:hover {
            background: #1d4ed8;
            color: white !important;
        }

        /* MAIN */
        .container {
            padding: 40px 80px;
        }

        /* DEFAULT COMPONENTS */
        .welcome {
            background: linear-gradient(to right, #2563eb, #1e40af);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .section {
            margin-top: 30px;
        }

        .section h3 {
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .box a {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }

        @media (max-width: 992px) {
            .navbar {
                padding: 15px 25px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .container {
                padding: 25px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .stats,
            .grid {
                grid-template-columns: 1fr;
            }

            .nav-links {
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="brand">Cryptographic Adaptive LMS</div>

        <div class="nav-links">
            <a href="{% url 'student:student_dashboard' %}">Dashboard</a>
            <a href="{% url 'student:my_courses' %}">My Courses</a>
            <a href="{% url 'student:progress_tracker' %}">Progress</a>
            <a href="{% url 'student:certificates' %}">Certificates</a>
            <a href="{% url 'accounts:logout' %}" class="logout">Logout</a>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
