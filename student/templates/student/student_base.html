<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LMS{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .navbar {
            width: 100%;
            background: #ffffff;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            color: #111827;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            padding-bottom: 6px;
            transition: 0.2s ease;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        .nav-links a.active {
            color: #2563eb;
            font-weight: 700;
        }

        .nav-links a.active::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background: #2563eb;
            bottom: 0;
            left: 0;
        }

        .logout {
            background: #2563eb;
            color: white !important;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            border: none;
        }

        .logout:hover {
            background: #1d4ed8;
            color: white !important;
        }

        .logout::after {
            display: none !important;
        }

        .container {
            width: 100%;
            padding: 28px;
            margin: 0;
        }

        .messages-wrap {
            margin-bottom: 24px;
        }

        .message-box {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 12px;
            border: 1px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
        }

        .message-success {
            background: #ecfdf5;
            color: #166534;
            border-color: #86efac;
        }

        .message-error {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fca5a5;
        }

        .message-warning {
            background: #fffbeb;
            color: #92400e;
            border-color: #fcd34d;
        }

        .message-info {
            background: #eff6ff;
            color: #1d4ed8;
            border-color: #93c5fd;
        }

        .welcome {
            background: linear-gradient(to right, #2563eb, #1e40af);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .section {
            margin-top: 30px;
        }

        .section h3 {
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .box a {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }

        @media (max-width: 992px) {
            .navbar {
                padding: 14px 16px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .container {
                padding: 16px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .stats,
            .grid {
                grid-template-columns: 1fr;
            }

            .nav-links {
                gap: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="brand">Adaptive Learning LMS</div>

        <div class="nav-links">
            <a href="{% url 'student:student_dashboard' %}"
               class="{% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}">
               Dashboard
            </a>

            <a href="{% url 'student:my_courses' %}"
               class="{% if request.resolver_match.url_name == 'my_courses' or request.resolver_match.url_name == 'course_detail' %}active{% endif %}">
               My Courses
            </a>

            <a href="{% url 'student:progress_tracker' %}"
               class="{% if request.resolver_match.url_name == 'progress_tracker' %}active{% endif %}">
               Progress
            </a>

            <a href="{% url 'student:certificates' %}"
               class="{% if request.resolver_match.url_name == 'certificates' %}active{% endif %}">
               Certificates
            </a>

            <a href="{% url 'student:profile' %}"
               class="{% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
               Profile
            </a>

            <a href="{% url 'accounts:logout' %}" class="logout">Logout</a>
        </div>
    </div>

    <div class="container">

        {% if messages %}
            <div class="messages-wrap">
                {% for message in messages %}
                    <div class="message-box
                        {% if message.tags == 'success' %}
                            message-success
                        {% elif message.tags == 'error' %}
                            message-error
                        {% elif message.tags == 'warning' %}
                            message-warning
                        {% else %}
                            message-info
                        {% endif %}
                    ">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
